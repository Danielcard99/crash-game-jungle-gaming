_format_version: "3.0"
plugins:
  # Global rate limit: 120 req/min per IP across all routes
  - name: rate-limiting
    config:
      minute: 120
      policy: local
      limit_by: ip
      hide_client_headers: false

services:
  - name: games-service
    url: http://games:4001
    routes:
      - name: games-routes
        paths:
          - /games
        strip_path: false
      - name: games-websocket
        paths:
          - /socket.io
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:5173"
          methods:
            - GET
            - POST
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
          exposed_headers:
            - Authorization
          credentials: true
      # Stricter limit on bet endpoints to prevent bet spamming
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          limit_by: ip
          hide_client_headers: false

  - name: wallets-service
    url: http://wallets:4002
    routes:
      - name: wallets-routes
        paths:
          - /wallets
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:5173"
          methods:
            - GET
            - POST
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
          exposed_headers:
            - Authorization
          credentials: true
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          limit_by: ip
          hide_client_headers: false