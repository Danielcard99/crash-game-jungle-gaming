name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client — Games
        run: DATABASE_URL="postgresql://placeholder/placeholder" bunx prisma generate
        working-directory: services/games

      - name: Generate Prisma client — Wallets
        run: DATABASE_URL="postgresql://placeholder/placeholder" bunx prisma generate
        working-directory: services/wallets

      - name: Test — Games Service
        run: bun test tests/unit
        working-directory: services/games

      - name: Test — Wallets Service
        run: bun test tests/unit
        working-directory: services/wallets

      - name: Test — Domain Kit
        run: bun test
        working-directory: packages/domain-kit

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client — Games
        run: DATABASE_URL="postgresql://placeholder/placeholder" bunx prisma generate
        working-directory: services/games

      - name: Generate Prisma client — Wallets
        run: DATABASE_URL="postgresql://placeholder/placeholder" bunx prisma generate
        working-directory: services/wallets

      - name: Typecheck — Games Service
        run: bunx tsc --noEmit
        working-directory: services/games

      - name: Typecheck — Wallets Service
        run: bunx tsc --noEmit
        working-directory: services/wallets

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Start infrastructure
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for games service..."
          timeout 60 bash -c 'until curl -sf http://localhost:8000/games/health; do sleep 2; done'
          echo "Waiting for wallets service..."
          timeout 60 bash -c 'until curl -sf http://localhost:8000/wallets/health; do sleep 2; done'

      - name: Run E2E tests — Games Service
        run: bun test tests/e2e
        working-directory: services/games

      - name: Stop infrastructure
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v
